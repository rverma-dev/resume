<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jobs and Applications</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #111;
      --muted: #666;
      --rule: #d8d8d8;
      --accent: #0b4f8a;
      --bg: #f6f6f6;
      --surface: #fff;
      --subtle: #fafafa;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font: 14px/1.45 -apple-system, "Helvetica Neue", Arial, "Segoe UI", sans-serif;
    }

    main {
      max-width: 1220px;
      margin: 28px auto 40px;
      padding: 0 24px;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 18px;
      margin: 0 0 16px;
    }

    h1 {
      margin: 0 0 3px;
      font-size: 24px;
      line-height: 1.12;
    }

    h2 {
      margin: 22px 0 10px;
      font-size: 16px;
      line-height: 1.2;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .summary,
    .timestamp {
      margin: 0;
      color: var(--muted);
    }

    .timestamp {
      white-space: nowrap;
      font-size: 12px;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(5, minmax(120px, 1fr));
      gap: 8px;
      margin: 0 0 14px;
    }

    .metric {
      min-height: 62px;
      padding: 10px 12px;
      border: 1px solid var(--rule);
      border-radius: 8px;
      background: var(--surface);
    }

    .metric strong {
      display: block;
      font-size: 22px;
      line-height: 1.05;
    }

    .metric span {
      color: var(--muted);
      font-size: 12px;
    }

    .controls {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) minmax(150px, 190px) minmax(150px, 190px);
      gap: 10px;
      margin: 0 0 14px;
    }

    input,
    select {
      min-height: 36px;
      border: 1px solid var(--rule);
      border-radius: 6px;
      background: var(--surface);
      color: var(--ink);
      padding: 7px 9px;
      font: inherit;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--surface);
      border: 1px solid var(--rule);
      border-radius: 8px;
      overflow: hidden;
    }

    th,
    td {
      padding: 9px 10px;
      border-bottom: 1px solid var(--rule);
      text-align: left;
      vertical-align: top;
    }

    th {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .04em;
      color: var(--muted);
      background: var(--subtle);
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .empty {
      padding: 18px;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--rule);
      border-radius: 8px;
    }

    @media (max-width: 760px) {
      main {
        margin-top: 18px;
        padding: 0 14px;
      }

      header {
        display: block;
      }

      .timestamp {
        margin-top: 6px;
      }

      .metrics,
      .controls {
        grid-template-columns: 1fr;
      }

      table {
        display: block;
        overflow-x: auto;
        white-space: nowrap;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Jobs and Applications</h1>
        <p class="summary" id="summary">Loading tracker...</p>
      </div>
      <p class="timestamp" id="timestamp"></p>
    </header>

    <section class="metrics" aria-label="Pipeline summary">
      <div class="metric"><strong id="metric-jobs">0</strong><span>Jobs tracked</span></div>
      <div class="metric"><strong id="metric-applications">0</strong><span>Applications</span></div>
      <div class="metric"><strong id="metric-ready">0</strong><span>Ready</span></div>
      <div class="metric"><strong id="metric-applied">0</strong><span>Applied</span></div>
      <div class="metric"><strong id="metric-active">0</strong><span>Interview / offer</span></div>
    </section>

    <div class="controls">
      <input id="search" type="search" placeholder="Search company, role, status, location, referral">
      <select id="application-status">
        <option value="">All application statuses</option>
        <option>discovered</option>
        <option>reviewing</option>
        <option>ready</option>
        <option>applied</option>
        <option>interview</option>
        <option>rejected</option>
        <option>offer</option>
        <option>archived</option>
      </select>
      <select id="job-status">
        <option value="">All job statuses</option>
        <option>discovered</option>
        <option>shortlisted</option>
        <option>researching</option>
        <option>ready</option>
        <option>applied</option>
        <option>archived</option>
      </select>
    </div>

    <section aria-labelledby="applications-heading">
      <h2 id="applications-heading">Applications</h2>
      <div id="applications-table"></div>
    </section>

    <section aria-labelledby="jobs-heading">
      <h2 id="jobs-heading">Job Inventory</h2>
      <div id="jobs-table"></div>
    </section>
  </main>

  <script>
    const state = { applications: [], jobs: [], errors: [] };

    const text = (value) => value == null ? "" : String(value);
    const safe = (value) => text(value)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;");

    function link(value, label = "open") {
      if (!value) return "";
      return `<a href="${safe(value)}">${safe(label)}</a>`;
    }

    function includesQuery(row, query) {
      return !query || JSON.stringify(row).toLowerCase().includes(query);
    }

    function filteredApplications() {
      const query = document.querySelector("#search").value.trim().toLowerCase();
      const status = document.querySelector("#application-status").value;
      return state.applications.filter((row) => includesQuery(row, query) && (!status || row.status === status));
    }

    function filteredJobs() {
      const query = document.querySelector("#search").value.trim().toLowerCase();
      const status = document.querySelector("#job-status").value;
      return state.jobs.filter((row) => includesQuery(row, query) && (!status || row.status === status));
    }

    function table(target, columns, rows, emptyText) {
      if (!rows.length) {
        document.querySelector(target).innerHTML = `<div class="empty">${safe(emptyText)}</div>`;
        return;
      }

      const head = `<thead><tr>${columns.map((col) => `<th>${safe(col.label)}</th>`).join("")}</tr></thead>`;
      const body = rows.map((row) => {
        const cells = columns.map((col) => `<td>${col.render(row)}</td>`).join("");
        return `<tr>${cells}</tr>`;
      }).join("");
      document.querySelector(target).innerHTML = `<table>${head}<tbody>${body}</tbody></table>`;
    }

    function render() {
      const applications = filteredApplications();
      const jobs = filteredJobs();
      const ready = state.applications.filter((row) => row.status === "ready").length;
      const applied = state.applications.filter((row) => row.status === "applied").length;
      const active = state.applications.filter((row) => ["interview", "offer"].includes(row.status)).length;

      document.querySelector("#metric-jobs").textContent = state.jobs.length;
      document.querySelector("#metric-applications").textContent = state.applications.length;
      document.querySelector("#metric-ready").textContent = ready;
      document.querySelector("#metric-applied").textContent = applied;
      document.querySelector("#metric-active").textContent = active;

      const shown = `${applications.length}/${state.applications.length} applications, ${jobs.length}/${state.jobs.length} jobs shown`;
      document.querySelector("#summary").textContent = state.errors.length ? `${shown}; ${state.errors.length} source failed` : shown;
      document.querySelector("#timestamp").textContent = new Date().toLocaleString();

      table("#applications-table", [
        { label: "Company", render: (row) => safe(row.company) },
        { label: "Role", render: (row) => safe(row.role || row.title) },
        { label: "Score", render: (row) => safe(row.score ?? "") },
        { label: "Applied", render: (row) => safe(row.applied_date) },
        { label: "Resume", render: (row) => link(row.resume_path) },
        { label: "Research", render: (row) => link(row.research_path) },
        { label: "Referral", render: (row) => safe(row.referral_status) },
        { label: "Status", render: (row) => safe(row.status || "discovered") }
      ], applications, "No applications yet.");

      table("#jobs-table", [
        { label: "Company", render: (row) => safe(row.company) },
        { label: "Role", render: (row) => safe(row.role || row.title) },
        { label: "Score", render: (row) => safe(row.score ?? "") },
        { label: "Location", render: (row) => safe(row.location) },
        { label: "Source", render: (row) => link(row.source_url || row.url) },
        { label: "Status", render: (row) => safe(row.status || "discovered") },
        { label: "Updated", render: (row) => safe(row.updated_at || row.discovered_at) }
      ], jobs, "No jobs imported yet.");
    }

    function loadJson(path, key) {
      return fetch(path, { cache: "no-store" })
        .then((response) => response.ok ? response.json() : Promise.reject(new Error(`${path}: ${response.status}`)))
        .then((data) => Array.isArray(data) ? data : (data[key] || []))
        .catch((error) => {
          state.errors.push(error.message);
          return [];
        });
    }

    Promise.all([
      loadJson("../applications/applications.json", "applications"),
      loadJson("index.json", "jobs")
    ]).then(([applications, jobs]) => {
      state.applications = applications;
      state.jobs = jobs;
      render();
    });

    document.querySelector("#search").addEventListener("input", render);
    document.querySelector("#application-status").addEventListener("change", render);
    document.querySelector("#job-status").addEventListener("change", render);
  </script>
</body>
</html>
