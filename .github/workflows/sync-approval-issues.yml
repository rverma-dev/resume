name: Sync recruiting issues

on:
  workflow_dispatch:
  schedule:
    - cron: "17,47 * * * *"

permissions:
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Import recruiting issue payloads
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python3 recruiting/scripts/sync_issue_approvals.py

      - name: Validate tracker
        run: |
          python3 recruiting/scripts/validate_pipeline.py
          jq empty jobs/index.json applications/applications.json recruiting/config.json applications/approval_inbox.json
          git diff --check

      - name: Commit tracker updates
        run: |
          if git diff --quiet -- jobs/index.json applications/applications.json applications/applications.jsonl applications/resumes applications/approval_inbox.json; then
            echo "No recruiting issue updates to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add jobs/index.json applications/applications.json applications/applications.jsonl applications/resumes applications/approval_inbox.json
          git commit -m "Sync recruiting issue updates"
          git push
